services:
  ollama:
    image: ollama/ollama:latest
    container_name: pv-ollama
    environment:
      OLLAMA_CONTEXT_LENGTH: 1024
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_NUM_PARALLEL: 1
    deploy:
      resources:
        limits:
          memory: 14g
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pv-backend
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5vl:7b}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-qwen2.5vl:3b-q4_K_M}
      PYTHONUNBUFFERED: "1"
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 20s

  frontend:
    build:
      context: ./front/risk-committee-pv-generation
      dockerfile: Dockerfile
    container_name: pv-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: pv-ollama-init
    profiles: ["init"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5vl:7b}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-qwen2.5vl:3b-q4_K_M}
    entrypoint: ["/bin/sh", "-c"]
    command: ollama pull "$${OLLAMA_VISION_MODEL}" && ollama pull "$${OLLAMA_MODEL}"

volumes:
  ollama_data: