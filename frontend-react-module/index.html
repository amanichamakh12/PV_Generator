<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PV Automation — Système de Procès-Verbaux</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --navy: #1B3A6B;
      --navy-light: #2952A3;
      --accent: #E8A020;
      --accent-light: #FDF3E0;
      --bg: #F7F8FA;
      --surface: #FFFFFF;
      --border: #E2E6EE;
      --text: #1A1F2E;
      --muted: #6B7280;
      --success: #0F6E56;
      --success-bg: #E1F5EE;
      --danger: #C0392B;
      --danger-bg: #FDECEA;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(27,58,107,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Layout */
    .shell { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      background: var(--navy);
      color: white;
      padding: 0;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .sidebar-brand {
      padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar-brand h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      font-weight: 400;
      margin: 0;
      color: white;
    }
    .sidebar-brand p {
      font-size: 12px;
      opacity: 0.8;
      margin: 4px 0 0 0;
      font-weight: 400;
    }
    .sidebar-nav {
      flex: 1;
      padding: 24px 0;
    }
    .nav-section {
      margin-bottom: 32px;
    }
    .nav-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 24px 8px;
      opacity: 0.7;
    }
    .nav-item {
      display: block;
      padding: 12px 24px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
    }
    .nav-item:hover {
      background: rgba(255,255,255,0.05);
      color: white;
      border-left-color: var(--accent);
    }
    .nav-item.active {
      background: rgba(255,255,255,0.1);
      color: white;
      border-left-color: var(--accent);
    }
    .nav-item-icon {
      display: inline-block;
      width: 16px;
      height: 16px;
      margin-right: 12px;
      vertical-align: middle;
    }

    /* Main Content */
    .main {
      background: var(--bg);
      padding: 32px;
      overflow-y: auto;
    }
    .main-header {
      margin-bottom: 32px;
    }
    .main-title {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 8px;
    }
    .main-subtitle {
      font-size: 16px;
      color: var(--muted);
      max-width: 600px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .card-header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin: 0;
    }
    .card-icon {
      width: 24px;
      height: 24px;
      margin-right: 12px;
      color: var(--accent);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      gap: 8px;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover {
      background: #d48f1c;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(232,160,32,0.3);
    }
    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: var(--bg);
      border-color: var(--navy);
    }

    /* Status */
    .status {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      gap: 6px;
    }
    .status-success {
      background: var(--success-bg);
      color: var(--success);
    }
    .status-error {
      background: var(--danger-bg);
      color: var(--danger);
    }
    .status-warning {
      background: var(--accent-light);
      color: var(--accent);
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .shell {
        grid-template-columns: 1fr;
      }
      .sidebar {
        display: none;
      }
      .main {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
